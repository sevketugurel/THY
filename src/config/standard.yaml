# Standard senaryo parametreleri (plan §6).
solver: highs            # highs | gurobi (soyutlama üzerinden, gurobi test edilmeyecek)
time_limit_sec: 1800     # Kapı-5 üretim merdiveni adım 1 (tam model) bütçesi
mip_gap: 0.01
seed: 42

# Kapı-5 üretim merdiveni (docs/CLOSING_PLAN.md, M5f, main.py --full-data):
# adım 1 (yukarıdaki time_limit_sec) başarısız olursa TEK bir elastik
# (A/B/E1/E2/F/G, slack-relaxed) solve denenir -- Σslack<=eps ise strict-
# feasible bir nokta olarak kabul edilir, değilse main.py şema-uyumlu bir
# teşhis çıktısı yazar (ihlalli tarife ASLA yazılmaz).
elastic_time_limit_sec: 600
watchdog_margin_sec: 60
elastic_watchdog_margin_sec: 120

adjustable_set: all      # all | none (M1'de yalnızca bu ikisi destekleniyor)
# VARSAYIM (720->180, docs/decisions.md 2026-07-09): per-candidate Big-M
# ~O(4*w) mertebesinde büyüyor; w=720 bazı adaylarda M>1440'a çıkarıyordu
# (plan'ın kendi "M<=1440" disiplinini ihlal). w=180 hem bu disiplini koruyor
# hem operasyonel olarak gerçekçi (birkaç saatlik kayma).
adjustable_window_min: 180

bucket_size_min: 10
capacity_departure: 10
capacity_arrival: 15

L: 60
U: 300
tau: 45
X_dev: 15
alpha: 0.20
gamma: 30
# KARAR-0 (docs/CLOSING_PLAN.md, VARSAYIM-16, M5f): E1 yalnızca HER İKİ yön
# de AKTİFKEN (>=1 sunulan bağlantı) bağlayıcı. "unconditional" eski literal
# okumayı duyarlılık analizi için korur.
e1_activation: conditional   # conditional | unconditional

enabled_constraints: [A, B, C, D, E1, E2, F, G]
max_slots_per_market: 20

# Benchmark-safe production path: default --full-data behavior. exit 0 means
# file-production only; the official strict gate remains available via
# --strict-gate.
benchmark_time_budget_sec: 600
benchmark_improve_enabled: true
seed_deltas_path: data_seed/full_data_best_deltas.json
